services:
  caddy:
    image: caddy:alpine
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./caddy/site:/srv:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - nanobot-1

  nanobot-1:
    container_name: nanobot-1
    build:
      context: .
      dockerfile: Dockerfile
    command: ["gateway"]
    restart: unless-stopped
    volumes:
      - ./configs/nanobot-1:/root/.nanobot
      - ./configs/nanobot-1/config.json:/root/.nanobot/config.json:ro
      - ./shared/skills:/root/.nanobot/workspace/skills:ro
      - ./shared/webhooks:/root/.nanobot/workspace/webhooks:ro
    expose:
      - "18790"
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M

volumes:
  caddy-data:
  caddy-config:
